<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomy of a Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== LANDING PAGE ===== -->
  <div id="landing" class="landing">
    <div class="landing-inner">
      <h1 class="landing-title"><em>Anatomy</em> <span class="landing-of">of a</span> Memory</h1>
      <div class="landing-intro">
        <p>Welcome!</p>
        <p>You find yourself at a familiar table.</p>
        <p>Everything is set… but something is missing.</p>
        <p>Can you piece it back together?</p>
      </div>
      <button id="enter-btn" class="enter-btn">enter memory</button>
    </div>
  </div>

  <!-- ===== MAIN EXPERIENCE ===== -->
  <main id="experience" class="layout hidden">

    <!-- Left column: title + photo -->
    <div class="left-col">
      <h1 class="title"><em>Anatomy</em> <span class="title-of">of a</span> Memory</h1>

      <div class="photo-area">
        <!-- Music notes: only visible when music is ON -->
        <img id="music-notes" class="music-notes" src="./music-notes.png" alt="musical notes" />
        <div class="photo-wrap">
          <img id="main-image" src="./state_0000.png" alt="Memory scene" />
        </div>
      </div>

      <!-- Caption -->
      <p id="caption" class="caption"></p>
    </div>

    <!-- Right column: toggles -->
    <aside class="right-col">
      <div class="intro">
        <p>Welcome!</p>
        <p>You find yourself at a familiar table.</p>
      </div>

      <div class="toggles">

        <div class="toggle-row" data-layer="set-table">
          <label class="check-label">
            <input type="checkbox" id="cb-set-table" checked>
            <span class="checkmark"></span>
            <span class="layer-name">Set the table</span>
          </label>
          <div class="slider-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="toggle-row" data-layer="atmosphere">
          <label class="check-label">
            <input type="checkbox" id="cb-atmosphere">
            <span class="checkmark"></span>
            <span class="layer-name">Atmosphere</span>
          </label>
          <div class="slider-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="toggle-row" data-layer="food">
          <label class="check-label">
            <input type="checkbox" id="cb-food">
            <span class="checkmark"></span>
            <span class="layer-name">Food</span>
          </label>
          <div class="slider-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="toggle-row" data-layer="people">
          <label class="check-label">
            <input type="checkbox" id="cb-people">
            <span class="checkmark"></span>
            <span class="layer-name">People</span>
          </label>
          <div class="slider-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="toggle-row" data-layer="music">
          <label class="check-label">
            <input type="checkbox" id="cb-music">
            <span class="checkmark"></span>
            <span class="layer-name">Music</span>
          </label>
          <div class="slider-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

      </div>
    </aside>
  </main>

  <!-- Audio elements -->
  <audio id="audio-atmosphere" src="./audio-atmosphere.wav" loop preload="auto"></audio>
  <audio id="audio-food"       src="./audio-food.wav"       loop preload="auto"></audio>
  <audio id="audio-people"     src="./audio-people.m4a"     loop preload="auto"></audio>
  <audio id="audio-music"      src="./audio-music.wav"      loop preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
